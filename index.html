<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>同じ読みのかん字クイズ</title>
<meta name="description" content="小学1・2年生の漢字の同音異義語・同じ読みの漢字を、例文で意味を理解して使い分ける学習クイズ。">
<meta name="theme-color" content="#ff8a3d">
<style>
  :root{
    --bg:#fff7ed; --card:#ffffff; --ink:#3b2f2f; --accent:#ff8a3d;
    --accent2:#4c7dff; --ok:#2bb673; --ng:#ef5350; --line:#f0d9c2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN",
      "Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:560px; padding:16px 14px 40px;}
  h1{font-size:1.35rem; text-align:center; margin:14px 0 4px;}
  .sub{text-align:center; font-size:.85rem; color:#9a7b5e; margin-bottom:14px;}
  .card{
    background:var(--card); border:3px solid var(--line); border-radius:22px;
    padding:20px 18px; box-shadow:0 6px 0 #f0d9c2;
  }
  /* grade select */
  .gradeSel{margin-bottom:16px;}
  .gradeLabel{font-size:.85rem; color:#9a7b5e; text-align:center; margin-bottom:8px;}
  .seg{display:flex; gap:8px; background:#f3e4d3; padding:6px; border-radius:16px;}
  .seg button{
    flex:1; border:none; background:transparent; padding:12px 0; border-radius:12px;
    font-size:1rem; font-weight:700; color:#9a7b5e; cursor:pointer;
  }
  .seg button.active{background:#fff; color:var(--accent); box-shadow:0 2px 6px rgba(0,0,0,.08);}
  .seg button.locked{opacity:.5;}

  /* きろくの 書き出し／読み込み */
  .saveBar{display:flex; gap:10px; justify-content:center; margin-top:16px;
           padding-top:14px; border-top:1px dashed var(--line);}
  .saveBar button, .saveBar .impBtn{
    border:1px solid var(--line); background:#fff; color:#9a7b5e; border-radius:99px;
    padding:7px 14px; font-size:.78rem; font-weight:700; cursor:pointer;
  }
  .saveBar button:active{transform:translateY(1px);}

  /* mode select */
  .modes{display:flex; flex-direction:column; gap:12px;}
  .mode-btn{
    border:none; border-radius:18px; padding:18px; font-size:1.1rem; font-weight:700;
    color:#fff; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12); text-align:left;
  }
  .mode-btn small{display:block; font-weight:400; font-size:.8rem; opacity:.95; margin-top:4px;}
  .m1{background:var(--accent);} .m2{background:var(--accent2);} .m3{background:#9b59b6;}
  .mode-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.12);}

  /* quiz */
  .homeBtn{
    float:right; border:2px solid var(--line); background:#fff; color:#c46a23;
    border-radius:99px; padding:6px 14px; font-size:.8rem; font-weight:700;
    cursor:pointer; margin:-4px -2px 8px 0;
  }
  .homeBtn:active{transform:translateY(1px);}
  .navBtn{
    float:left; border:2px solid var(--line); background:#fff; color:#c46a23;
    border-radius:99px; padding:6px 14px; font-size:.8rem; font-weight:700;
    cursor:pointer; margin:-4px 0 8px -2px;
  }
  .navBtn:active{transform:translateY(1px);}
  .bar{height:12px; background:#f3e4d3; border-radius:99px; overflow:hidden; margin-bottom:6px; clear:both;}
  .bar > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}
  .meta{display:flex; justify-content:space-between; font-size:.8rem; color:#9a7b5e; margin-bottom:14px;}
  .tag{display:inline-block; font-size:.72rem; background:#fff1e3; color:#c46a23;
       padding:3px 10px; border-radius:99px; margin-bottom:10px;}
  .q{font-size:1.5rem; line-height:2; text-align:center; margin:6px 0 4px;}
  .q .blank{display:inline-block; min-width:1.6em; border-bottom:4px dotted var(--accent);
            color:transparent;}
  .read{text-align:center; color:#c46a23; font-size:1rem; margin-bottom:18px;}
  ruby rt{font-size:.55em; color:#b08968;}
  .choices{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .choice{
    border:3px solid var(--line); background:#fff; border-radius:16px;
    padding:16px 8px; font-size:1.7rem; font-weight:700; cursor:pointer;
    transition:.1s; box-shadow:0 4px 0 #f0d9c2;
  }
  .choice:active{transform:translateY(2px); box-shadow:0 2px 0 #f0d9c2;}
  .choice.ok{background:#e6f8ef; border-color:var(--ok); color:var(--ok);}
  .choice.ng{background:#fdeceb; border-color:var(--ng); color:var(--ng);}
  .choice:disabled{cursor:default;}

  .feedback{margin-top:18px; padding:16px; border-radius:16px; display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e6f8ef; border:2px solid var(--ok);}
  .feedback.bad{background:#fdeceb; border:2px solid var(--ng);}
  .fb-head{font-weight:700; font-size:1.1rem; margin-bottom:8px;}
  .fb-sentence{font-size:1.05rem; line-height:1.7; margin-bottom:8px;}
  .fb-sentence b{color:var(--accent); font-size:1.2rem;}
  .fb-line{font-size:.95rem; line-height:1.7;}
  .fb-line b{color:#c46a23;}
  .fb-kanji{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);
            font-size:.9rem; line-height:1.8; color:#6b5a4a;}
  .fb-kanji b{color:var(--ink); font-size:1.15rem;}
  .next{
    margin-top:14px; width:100%; border:none; border-radius:16px; padding:16px;
    font-size:1.1rem; font-weight:700; color:#fff; background:var(--accent2);
    cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12);
  }
  .next:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.12);}

  /* result */
  .result{text-align:center;}
  .score{font-size:3rem; font-weight:800; color:var(--accent); margin:10px 0;}
  .again{border:none; border-radius:16px; padding:16px 28px; font-size:1.05rem; font-weight:700;
         color:#fff; background:var(--accent); cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12); margin:6px;}
  .home{background:#9b59b6;}
  .stars{font-size:1.8rem; letter-spacing:4px;}

  /* 結果の振り返り */
  .review{display:none; text-align:left; margin:8px 0 16px; padding:14px;
          background:#fdf6ee; border:2px solid var(--line); border-radius:14px;}
  .rv-h{font-weight:700; color:#c46a23; margin-bottom:8px; text-align:center;}
  .rv-i{font-size:1rem; line-height:1.9; padding:4px 0; border-bottom:1px dashed var(--line);}
  .rv-i:last-child{border-bottom:none;}
  .rv-i b{color:var(--accent); font-size:1.15rem;}
  .retryWrong{background:var(--ng);}

  /* キーボード操作のフォーカス可視化 */
  :focus-visible{outline:3px solid var(--accent2); outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }

  /* コンボ */
  #combo{font-weight:800; color:#ff6a00; font-size:.85rem;}
  #combo.pop{animation:pop .45s;}
  @keyframes pop{0%{transform:scale(.5);opacity:0} 55%{transform:scale(1.35)} 100%{transform:scale(1)}}

  /* 紙ふぶき */
  .confetti{position:fixed; top:-30px; pointer-events:none; z-index:50; will-change:transform;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg); opacity:.15;}}

  /* デイリーチャレンジ */
  .dailyBtn{
    width:100%; border:none; border-radius:16px; padding:16px; margin-bottom:12px;
    font-size:1.05rem; font-weight:800; color:#fff; cursor:pointer;
    background:linear-gradient(135deg,#ffb03d,#ff7a3d); box-shadow:0 4px 0 rgba(0,0,0,.12);
  }
  .dailyBtn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.12);}
  #dailyInfo{display:block; font-size:.78rem; font-weight:600; opacity:.95; margin-top:3px;}

  /* コレクション入口 */
  .collbar{display:flex; gap:12px; margin-top:14px;}
  .collbar button{flex:1; border:2px solid var(--line); background:#fff; color:#c46a23;
    border-radius:16px; padding:14px 8px; font-size:1rem; font-weight:700; cursor:pointer;}
  .collbar button:active{transform:translateY(2px);}

  .backBtn{border:2px solid var(--line); background:#fff; color:#c46a23; border-radius:99px;
    padding:8px 16px; font-size:.9rem; font-weight:700; cursor:pointer; margin-bottom:12px;}
  .collHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .collHead h2{font-size:1.15rem; margin:0;}
  .collHead .cnt{font-size:.85rem; color:#9a7b5e; font-weight:700;}

  /* 図鑑 */
  .dexGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(82px,1fr)); gap:10px;}
  .dcard{border:2px solid var(--line); border-radius:12px; padding:8px 4px; text-align:center; background:#fff;}
  .dcard.locked{background:#f3e9df; color:#cbb9a6;}
  .dcard .k{font-size:1.8rem; font-weight:800; line-height:1.1;}
  .dcard .star{font-size:.85rem; color:#ffb300; line-height:1;}
  .dcard .info{font-size:.6rem; color:#8a7a6a; margin-top:3px; line-height:1.35;}
  .dcard.master{border-color:#ffb300; box-shadow:inset 0 0 0 2px #ffe9b0;}

  /* メダル */
  .medalList{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .medal{border:2px solid var(--line); border-radius:14px; padding:12px 8px; text-align:center; background:#fff;}
  .medal.locked{opacity:.45; filter:grayscale(1);}
  .medal .mi{font-size:2rem; line-height:1;}
  .medal .mn{font-weight:700; font-size:.85rem; margin-top:5px;}
  .medal .md{font-size:.72rem; color:#8a7a6a; margin-top:2px; line-height:1.4;}

  .earned{display:none; margin:8px 0 4px; font-size:1rem; font-weight:700; color:#c46a23;}
  .comboBest{font-size:.95rem; color:#9a7b5e; margin-bottom:6px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>同じ読みの かん字クイズ</h1>
  <div class="sub">― 文を読んで、正しいかん字をえらぼう ―</div>

  <!-- スタート画面 -->
  <div id="home" class="card">
    <button class="dailyBtn" id="openDaily" type="button">📅 きょうの チャレンジ<span id="dailyInfo"></span></button>
    <div class="gradeSel">
      <div class="gradeLabel">学年（がくねん）をえらぶ</div>
      <div class="seg" id="seg">
        <button data-grade="1">1年</button>
        <button data-grade="2">2年</button>
        <button data-grade="3">3年🔒</button>
        <button data-grade="all" class="active">ぜんぶ</button>
      </div>
    </div>
    <div class="gradeSel">
      <div class="gradeLabel">もんだいの数（かず）</div>
      <div class="seg" id="countSeg">
        <button data-count="10" class="active">10もん</button>
        <button data-count="20">20もん</button>
        <button data-count="all">ぜんぶ</button>
      </div>
    </div>
    <div class="modes">
      <button class="mode-btn m1" data-mode="tsukai">
        ① つかい分け（あう…会う・合う）
        <small>同じ音で 意味（いみ）がちがう かん字を、文で見分ける</small>
      </button>
      <button class="mode-btn m2" data-mode="onaji">
        ② 同じ読みの かん字さがし
        <small>「ほし＝星」「こえ＝声」など、読みからかん字をえらぶ</small>
      </button>
      <button class="mode-btn m3" data-mode="all">
        ③ ぜんぶ まとめて
        <small>①と②を シャッフルして 出題</small>
      </button>
    </div>
    <button class="dailyBtn" id="openReview" type="button" style="background:linear-gradient(135deg,#7bc47b,#3da35a);margin-top:14px;">🔁 まちがい ふくしゅう<span id="reviewInfo"></span></button>
    <div class="collbar">
      <button id="openDex" type="button">📖 かん字ずかん</button>
      <button id="openMedals" type="button">🏅 メダル</button>
    </div>
    <div class="saveBar">
      <button id="exportSave" type="button">💾 きろくを ほぞん</button>
      <label class="impBtn" for="importFile">📂 きろくを よみこむ</label>
      <input id="importFile" type="file" accept="application/json,.json" hidden>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz" class="card" style="display:none;">
    <button class="navBtn" id="prev">← 前へ</button>
    <button class="homeBtn" id="quizHome">🏠 HOME</button>
    <div class="bar"><i id="prog"></i></div>
    <div class="meta"><span id="count"></span><span id="combo"></span><span id="score"></span></div>
    <span class="tag" id="tag"></span>
    <div class="q" id="question"></div>
    <div class="read" id="readline"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <div class="fb-head" id="fbHead"></div>
      <div class="fb-line" id="fbBody"></div>
      <button class="next" id="next">つぎへ →</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result" class="card result" style="display:none;">
    <div class="stars" id="stars"></div>
    <div class="score" id="finalScore"></div>
    <div class="comboBest" id="comboBest"></div>
    <div id="comment" style="margin-bottom:12px;"></div>
    <div class="earned" id="earned"></div>
    <div class="review" id="review"></div>
    <button class="again retryWrong" id="retryWrong" style="display:none;">まちがえた問題だけ もう一回</button>
    <button class="again" id="retry">もう一回</button>
    <button class="again home" id="back">さいしょの画面</button>
  </div>

  <!-- 漢字ずかん画面 -->
  <div id="dex" class="card" style="display:none;">
    <button class="backBtn" id="dexBack">← もどる</button>
    <div class="collHead"><h2>📖 かん字ずかん</h2><span class="cnt" id="dexCnt"></span></div>
    <div style="font-size:.8rem;color:#9a7b5e;margin-bottom:6px;">正かいすると 図かんに ふえるよ。3かい 正かいで ★マスター！</div>
    <div id="dexUnlock" style="font-size:.85rem;font-weight:700;color:#c46a23;margin-bottom:10px;"></div>
    <div class="dexGrid" id="dexGrid"></div>
  </div>

  <!-- メダル画面 -->
  <div id="medals" class="card" style="display:none;">
    <button class="backBtn" id="medalsBack">← もどる</button>
    <div class="collHead"><h2>🏅 メダル</h2><span class="cnt" id="medalsCnt"></span></div>
    <div class="medalList" id="medalList"></div>
  </div>
</div>

<script>
/* ===========================================================
   漢字マスタDB（唯一の正データ）
   キー＝漢字　g:学年  s:画数  on:音読み[]  kun:訓読み[]
   ※ 学年フィルタや解説はここから引く。漢字を足すときはここに追加。
   ※ 2年生は現在クイズで使う字のみ収録。同じ形式で160字まで拡張可。
   =========================================================== */
const KANJI = {
  // ── 1年生（80字）──
  '一':{g:1,s:1,on:['イチ','イツ'],kun:['ひと']},
  '右':{g:1,s:5,on:['ウ','ユウ'],kun:['みぎ']},

  '花':{g:1,s:7,on:['カ'],kun:['はな']},
  '貝':{g:1,s:7,on:[],kun:['かい']},
  '学':{g:1,s:8,on:['ガク'],kun:['まな(ぶ)']},
  '気':{g:1,s:6,on:['キ','ケ'],kun:[]},
  '九':{g:1,s:2,on:['キュウ','ク'],kun:['ここの(つ)']},
  '休':{g:1,s:6,on:['キュウ'],kun:['やす(む)']},
  '玉':{g:1,s:5,on:['ギョク'],kun:['たま']},
  '金':{g:1,s:8,on:['キン','コン'],kun:['かね','かな']},
  '空':{g:1,s:8,on:['クウ'],kun:['そら','あ(ける)','から']},
  '月':{g:1,s:4,on:['ゲツ','ガツ'],kun:['つき']},
  '犬':{g:1,s:4,on:['ケン'],kun:['いぬ']},
  '見':{g:1,s:7,on:['ケン'],kun:['み(る)','み(える)']},
  '五':{g:1,s:4,on:['ゴ'],kun:['いつ(つ)']},

  '四':{g:1,s:5,on:['シ'],kun:['よっ(つ)','よん']},
  '糸':{g:1,s:6,on:['シ'],kun:['いと']},
  '字':{g:1,s:6,on:['ジ'],kun:['あざ']},
  '耳':{g:1,s:6,on:['ジ'],kun:['みみ']},
  '七':{g:1,s:2,on:['シチ'],kun:['なな(つ)','なな']},
  '車':{g:1,s:7,on:['シャ'],kun:['くるま']},

  '二':{g:1,s:2,on:['ニ'],kun:['ふた(つ)']},

/* 単語から漢字の最大学年を求める（送りがなは無視） */
function wordGrade(word){
  let g = 0;
  for(const ch of word){
    if(KANJI[ch]) g = Math.max(g, KANJI[ch].g);
  }
  return g; // 漢字が無ければ 0
}

/* ===== セーブ（localStorage）と コレクション ===== */
const STORE_KEY = 'kanjiQuiz.v1';
function loadStore(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveStore(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e){} }
let store = loadStore();
store.kanji   = store.kanji   || {};   // { 漢字: 正解した回数 }
store.medals  = store.medals  || {};   // { メダルID: true }

store.perfectCount = store.perfectCount || 0;   // 全問正解した回数
store.comebacks    = store.comebacks    || 0;   // まちがいを なおした回数
store.daily   = store.daily   || { streak:0, bestStreak:0, lastDay:null };
store.unlocked3 = store.unlocked3 || false;     // 3年生 解放ずみか

// 集めらる漢字＝問題の「正解」に出てくる漢字（学年→画数順）
const COLLECTIBLE = [...new Set(
  BANK.flatMap(q => [...q.answer].filter(c => KANJI[c]))
)].sort((a,b)=> KANJI[a].g - KANJI[b].g || KANJI[a].s - KANJI[b].s || (a<b?-1:1));

const dexCount    = ()=> COLLECTIBLE.filter(ch => (store.kanji[ch]||0) >= 1).length;
const masterCount = ()=> COLLECTIBLE.filter(ch => (store.kanji[ch]||0) >= 3).length;

// 3年生の解放：1・2年の図鑑コンプリートで解放
const COLLECTIBLE12 = COLLECTIBLE.filter(ch => KANJI[ch].g <= 2);
function grade3Unlocked(){
  return !!store.unlocked3 || COLLECTIBLE12.every(ch => (store.kanji[ch]||0) >= 1);
}
function checkUnlock(){    // 初めて条件を満たした瞬間だけ true
  if(!store.unlocked3 && COLLECTIBLE12.every(ch => (store.kanji[ch]||0) >= 1)){
    store.unlocked3 = true; saveStore(); return true;
  }
  return false;
}

// 正解した漢字を記録（2段階：1回で図鑑入り→3回で★）
function recordCorrect(answer){
  [...answer].filter(c => KANJI[c]).forEach(ch=>{
    store.kanji[ch] = (store.kanji[ch]||0) + 1;
  });
  saveStore();
}

// 紙ふぶき
function confettiBurst(n){
  const emo = ['🎉','⭐','✨','🎊','🌟'];
  for(let i=0;i<n;i++){
    const s = document.createElement('div');
    s.className = 'confetti';
    s.textContent = emo[i % emo.length];
    s.style.left = (2 + (i*9 + (i*i)%13) % 96) + 'vw';   // indexで散らす（乱数不要）
    const dur = 1.3 + (i % 7) * 0.18;
    s.style.fontSize = (1 + (i % 4) * 0.3) + 'rem';
    s.style.animation = `fall ${dur}s linear forwards`;
    document.body.appendChild(s);
    setTimeout(()=> s.remove(), dur*1000 + 120);
  }
}

function shuffle(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ===== デイリーチャレンジ ===== */
let isDaily = false;
// その日のローカル日付を「epochからの日数」で（連続日数の計算用）
function todayIndex(){
  const d = new Date();
  return Math.floor((d.getTime() - d.getTimezoneOffset()*60000) / 86400000);
}
// 日付をタネにした決定的シャッフル（同じ日は全員・何回でも同じ10問）
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1 | a);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed){
  const r = mulberry32(seed); const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(r()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function startDaily(){
  isDaily = true;
  const maxC = grade3Unlocked() ? 3 : 2;   // 解放ぶんだけ出題
  const pool = BANK.filter(q => q.choices.every(c=>wordGrade(c)<=maxC) && wordGrade(q.answer)<=maxC);
  deck = seededShuffle(pool, todayIndex()).slice(0, 10);
  idx = 0; answers = []; order = []; combo = 0; sessionMaxCombo = 0;
  showOnly('quiz'); render();
}
function updateDailyStreak(){
  const dy = store.daily, ti = todayIndex();
  if(dy.lastDay !== ti){
    dy.streak = (dy.lastDay === ti-1) ? (dy.streak||0)+1 : 1;
    dy.lastDay = ti;
    dy.bestStreak = Math.max(dy.bestStreak||0, dy.streak);
    saveStore();
  }
}

/* ===== 復習（まちがえた問題） ===== */
const reviewList = ()=> BANK.filter(q => store.wrong[q.id]);
function startReview(){
  let pool = reviewList();
  if(pool.length === 0){
    alert('ふくしゅうする問題は ありません。\nまちがえた問題が ここに たまります。');
    return;
  }
  isDaily = false;
  let d = shuffle(pool);
  if(d.length > 20) d = d.slice(0, 20);   // 1回は最大20問
  startWithDeck(d);
}

/* 学年フィルタ：選んだ学年で「習った字だけ」を出す
   - maxG までの字しか選択肢に出さない（知らない字を見せない）
   - 単一学年（1 or 2）のときは、正解の字がその学年のものに限定 */
// currentGrade（'1','2','3','all'）→ {許す正解学年, 選択肢の最大学年}
function gradeSpec(){
  let g = currentGrade;
  if(g === 'all') g = grade3Unlocked() ? '123' : '12';
  const set = g.split('').map(Number);
  return { ans: new Set(set), maxC: Math.max(...set) };
}
function gradeOK(q){
  const { ans, maxC } = gradeSpec();
  for(const c of q.choices){ if(wordGrade(c) > maxC) return false; }  // 知らない字は出さない
  return ans.has(wordGrade(q.answer));                                 // 正解の学年が対象か
}

function startMode(mode){
  currentMode = mode;
  let pool = BANK.filter(q => (mode==='all' ? true : q.type===mode) && gradeOK(q));
  if(pool.length === 0){
    alert('この 学年と モードの くみあわせには まだ もんだいが ありません。\nべつの 学年か モードを えらんでね。');
    return;
  }
  isDaily = false;
  let d = shuffle(pool);
  if(currentCount !== 'all') d = d.slice(0, Number(currentCount));
  startWithDeck(d);
}

// 任意の問題リストでクイズを開始（まちがい復習でも使う）
function startWithDeck(questions){
  isDaily = false;
  deck = shuffle(questions);
  idx = 0; answers = []; order = [];
  combo = 0; sessionMaxCombo = 0;
  showOnly('quiz');
  render();
}

// 正解の漢字の 画数・音読み・訓読み を KANJI DB から作る
function kanjiMemo(word){
  const chars = [...word].filter(c => KANJI[c]);
  if(!chars.length) return '';
  return chars.map(c=>{
    const k = KANJI[c];
    const on  = k.on.length  ? '音:'+k.on.join('・')  : '';
    const kun = k.kun.length ? '訓:'+k.kun.join('・') : '';
    return `<b>${c}</b>（${k.s}画）` + [on,kun].filter(Boolean).join(' ／ ');
  }).join('<br>');
}

function showFeedback(q, isOK){
  const fb = $('feedback');
  fb.className = 'feedback show ' + (isOK?'good':'bad');
  $('fbHead').textContent = isOK ? '⭕ せいかい！' : '❌ おしい！　正かいは「'+q.answer+'」';
  // 完成した文（空らんに正解を入れたもの）
  const parts = q.sentence.split('@@');
  let html = `<div class="fb-sentence">${parts[0]}<b>${q.answer}</b>${parts[1]}</div>`;
  // 解説：えらべた言葉ぜんぶの意味
  q.choices.forEach(c=>{
    const mark = (c===q.answer)?'✅':'　';
    html += `<div class="fb-line">${mark} <b>${c}</b>… ${q.meaning[c]}</div>`;
  });
  // 漢字メモ（画数・音訓）
  const memo = kanjiMemo(q.answer);
  if(memo) html += `<div class="fb-kanji">📖 ${memo}</div>`;
  $('fbBody').innerHTML = html;
}

function render(){
  const q = deck[idx];
  $('tag').textContent = q.tag;
  // 文を組み立て（@@ を空らんに）
  const parts = q.sentence.split('@@');
  $('question').innerHTML = parts[0] +
    '<span class="blank" role="img" aria-label="ここに かん字が 入る">○</span>' + parts[1];
  $('readline').innerHTML = '読み：<b>' + q.read + '</b>';
  $('count').textContent = `だい ${idx+1} / ${deck.length} もん`;
  $('score').textContent = `せいかい ${scoreCount()}`;
  $('prog').style.width = (idx/deck.length*100) + '%';
  $('prev').style.visibility = idx>0 ? 'visible' : 'hidden';
  $('combo').textContent = '';        // コンボ表示は回答時だけ出す

  const answered = answers[idx];
  // 選択肢の並びは問題ごとに固定（戻っても入れ替わらない）
  if(!order[idx]) order[idx] = shuffle(q.choices);
  const box = $('choices'); box.innerHTML='';
  order[idx].forEach(c=>{
    const b = document.createElement('button');
    b.className='choice';
    // 送りがなを薄く見せず、言葉そのものを表示
    b.innerHTML = c.replace(/[ぁ-ん]+/g, m=>`<span style="font-size:1rem">${m}</span>`);
    if(answered){
      b.disabled = true;
      if(c===q.answer) b.classList.add('ok');
      if(!answered.correct && c===answered.picked) b.classList.add('ng');
    } else {
      b.onclick = ()=> choose(b, c, q);
    }
    box.appendChild(b);
  });
  // すでに答えた問題なら、解説をそのまま表示
  if(answered){ showFeedback(q, answered.correct); }
  else { $('feedback').className='feedback'; }
}

function choose(btn, picked, q){
  if(answers[idx]) return;            // 二重回答ふせぎ
  const isOK = picked===q.answer;
  answers[idx] = { picked, correct:isOK };
  [...$('choices').children].forEach(b=>{
    b.disabled = true;
    if(b.textContent===q.answer) b.classList.add('ok');
  });
  if(isOK){
    combo++;
    sessionMaxCombo = Math.max(sessionMaxCombo, combo);
    if(combo > store.bestCombo) store.bestCombo = combo;
    store.totalCorrect++;
    if(store.wrong[q.id]){ delete store.wrong[q.id]; store.comebacks++; }  // 復習で克服
    recordCorrect(q.answer);          // 図鑑に記録（saveStoreも実行）
    showCombo(combo);
    if(combo===3 || combo===5 || combo>=10 && combo%5===0) confettiBurst(14);
  } else {
    combo = 0;
    store.wrong[q.id] = true;         // 復習リストに追加
    saveStore();
    btn.classList.add('ng');
    $('combo').textContent = '';
  }
  showFeedback(q, isOK);
  $('score').textContent = `せいかい ${scoreCount()}`;
}

function showCombo(n){
  const el = $('combo');
  if(n >= 2){
    el.textContent = `🔥 ${n}れんぞく`;
    el.className = 'pop';
    setTimeout(()=>{ el.className=''; }, 450);
  } else {
    el.textContent = '';
  }
}

function next(){
  idx++;
  if(idx>=deck.length){ showResult(); }
  else render();
}

function prev(){
  if(idx>0){ idx--; render(); }
}

function showResult(){
  showOnly('result');
  const total = deck.length;
  const correct = scoreCount();
  $('finalScore').textContent = `${correct} / ${total} もん せいかい`;
  const rate = correct/total;
  const nStar = rate===1?3 : rate>=0.7?2 : rate>=0.4?1 : 0;
  $('stars').textContent = '⭐'.repeat(nStar) + '☆'.repeat(3-nStar);
  $('comment').textContent =
    rate===1 ? 'ぜんもん せいかい！すごい！' :
    rate>=0.7 ? 'よくできました！' :
    rate>=0.4 ? 'もう少し！もう一回やってみよう' :
    'だいじょうぶ、くりかえせば できるよ！';

  // セーブ更新（プレイ回数・全問正解フラグ・デイリー連続日数）→ 解放・メダル判定
  store.plays += 1;
  if(rate===1){ store.perfect = true; store.perfectCount++; confettiBurst(26); }
  if(isDaily) updateDailyStreak();
  const justUnlocked = checkUnlock();
  saveStore();
  const newly = checkMedals();
  if(justUnlocked) confettiBurst(36);

  $('comboBest').textContent = sessionMaxCombo>=2 ? `さい高コンボ：🔥 ${sessionMaxCombo}れんぞく` : '';
  const em = $('earned');
  const banner = justUnlocked ? '🎉 3年生が かいきん！　' : '';
  if(banner || newly.length){
    em.style.display = 'block';
    em.innerHTML = banner + (newly.length ? '🏅 あたらしいメダル：' + newly.map(m=>`${m.icon}${m.name}`).join('　') : '');
  } else {
    em.style.display = 'none';
  }

  // まちがえた問題の振り返り
  wrongQuestions = deck.filter((q,i)=> answers[i] && !answers[i].correct);
  const rv = $('review');
  if(wrongQuestions.length){
    rv.style.display = 'block';
    rv.innerHTML = `<div class="rv-h">まちがえた問題（${wrongQuestions.length}）</div>` +
      wrongQuestions.map(q=>{
        const p = q.sentence.split('@@');
        return `<div class="rv-i">${p[0]}<b>${q.answer}</b>${p[1]}<span style="color:#9a7b5e;font-size:.8rem">（${q.read}）</span></div>`;
      }).join('');
    $('retryWrong').style.display = 'inline-block';
  } else {
    rv.style.display = 'none';
    $('retryWrong').style.display = 'none';
  }
}

// 出題数セレクター
document.querySelectorAll('#countSeg button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#countSeg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentCount = b.dataset.count;
  };
});
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=> startMode(b.dataset.mode);
});
// 図鑑を描く
function renderDex(){
  $('dexCnt').textContent = `${dexCount()} / ${COLLECTIBLE.length} 字（★${masterCount()}）`;
  if(grade3Unlocked()){
    $('dexUnlock').textContent = '🔓 3年生 かいきん中！';
  } else {
    const rem = COLLECTIBLE12.filter(ch => !((store.kanji[ch]||0) >= 1)).length;
    $('dexUnlock').textContent = `あと ${rem}字（1・2年）で 3年生 かいきん！`;
  }
  const grid = $('dexGrid'); grid.innerHTML = '';
  COLLECTIBLE.forEach(ch=>{
    const k = KANJI[ch], c = store.kanji[ch]||0;
    const div = document.createElement('div');
    if(c>=1){
      const master = c>=3;
      div.className = 'dcard' + (master ? ' master' : '');
      const on  = k.on.length  ? '音 '+k.on.join('・')  : '';
      const kun = k.kun.length ? '訓 '+k.kun.join('・') : '';
      div.innerHTML = `<div class="k">${ch}</div><div class="star">${master?'★':'☆'}</div>`
        + `<div class="info">${k.s}画<br>${on}${on&&kun?'<br>':''}${kun}</div>`;
    } else {
      div.className = 'dcard locked';
      div.innerHTML = `<div class="k">？</div><div class="info">みつけよう</div>`;
    }
    grid.appendChild(div);
  });
}

// メダルを描く
function renderMedals(){
  const got = MEDALS.filter(m=>store.medals[m.id]).length;
  $('medalsCnt').textContent = `${got} / ${MEDALS.length}`;
  const list = $('medalList'); list.innerHTML = '';
  MEDALS.forEach(m=>{
    const has = !!store.medals[m.id];
    const div = document.createElement('div');
    div.className = 'medal' + (has ? '' : ' locked');
    div.innerHTML = `<div class="mi">${has?m.icon:'🔒'}</div><div class="mn">${m.name}</div><div class="md">${m.desc}</div>`;
    list.appendChild(div);
  });
}

function showOnly(id){
  ['home','quiz','result','dex','medals'].forEach(s=>{
    $(s).style.display = (s===id) ? 'block' : 'none';
  });
}
// ホームの デイリー／復習 の表示を最新化
function refreshHome(){
  const dy = store.daily, ti = todayIndex();
  let info = '';
  if((dy.streak||0)>0 && (dy.lastDay===ti || dy.lastDay===ti-1)) info += `🔥${dy.streak}日れんぞく　`;
  info += (dy.lastDay===ti) ? 'きょうは クリア✓' : 'まいにち 10もん！';
  $('dailyInfo').textContent = info;
  const rc = reviewList().length;
  $('reviewInfo').textContent = rc ? `のこり ${rc}問` : 'まちがいは ありません';
  // 3年生ボタンのロック表示
  const g3 = grade3Unlocked();
  const b3 = document.querySelector('#seg button[data-grade="3"]');
  if(b3){ b3.textContent = g3 ? '3年' : '3年🔒'; b3.classList.toggle('locked', !g3); }
}
function goHome(){ refreshHome(); showOnly('home'); }
$('next').onclick = next;
$('prev').onclick = prev;
$('retry').onclick = ()=> startMode(currentMode);
$('retryWrong').onclick = ()=> startWithDeck(wrongQuestions);
$('back').onclick = goHome;
$('quizHome').onclick = goHome;

// きろくの 書き出し／読み込み（バックアップ）
function exportSave(){
  const blob = new Blob([JSON.stringify(store)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'かん字クイズ-きろく.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importSave(file){
  const r = new FileReader();
  r.onload = ()=>{
    try {
      const obj = JSON.parse(r.result);
      if(!obj || typeof obj !== 'object' || !obj.kanji) throw 0;
      if(!confirm('いまの きろくを、よみこんだ きろくに 入れかえます。よろしいですか？')) return;
      localStorage.setItem(STORE_KEY, JSON.stringify(obj));
      location.reload();
    } catch(e){ alert('この ファイルは よみこめませんでした。'); }
  };
  r.readAsText(file);
}
$('exportSave').onclick = exportSave;
$('importFile').onchange = (e)=>{ const f = e.target.files[0]; if(f) importSave(f); e.target.value=''; };

// デイリー・復習
$('openDaily').onclick  = startDaily;
$('openReview').onclick = startReview;

// コレクション画面
$('openDex').onclick    = ()=>{ renderDex();    showOnly('dex'); };
$('openMedals').onclick = ()=>{ renderMedals(); showOnly('medals'); };
$('dexBack').onclick    = goHome;
$('medalsBack').onclick = goHome;

// 初期表示
refreshHome();

// キーボード操作（PC）：1〜4で選択、Enter/→で次へ、←で前へ
document.addEventListener('keydown', e=>{
  if($('quiz').style.display === 'none') return;
  if(e.key>='1' && e.key<='9'){
    const btns = $('choices').querySelectorAll('button:not(:disabled)');
    const i = Number(e.key)-1;
    if(btns[i]) btns[i].click();
  } else if(e.key==='Enter' || e.key==='ArrowRight'){
    if($('feedback').classList.contains('show')) next();
  } else if(e.key==='ArrowLeft'){
    prev();
  }
});
</script>
